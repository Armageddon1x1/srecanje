<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Srečanje Generacij</title>
    <style>
        body {
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1d1d1f;
        }

        .main-wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 1100px;
            padding: 40px;
            animation: fadeIn 1.2s ease-out;
        }

        /* Slika na levi */
        .image-container img {
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Vsebina na desni */
        .content {
            text-align: left;
        }

        .eyebrow {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            color: #86868b;
            margin-bottom: 8px;
        }

        .headline {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin: 0 0 40px 0;
        }

        .countdown-grid {
            display: flex;
            gap: 30px;
        }

        .time-block span {
            font-size: 64px;
            font-weight: 600;
            display: block;
            line-height: 1;
        }

        .time-block p {
            font-size: 16px;
            color: #86868b;
            margin-top: 8px;
        }

        .event-info {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #d2d2d7;
            font-size: 18px;
            color: #424245;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Prilagoditev za mobilne naprave */
        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; text-align: center; }
            .content { text-align: center; }
            .countdown-grid { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="image-container">
        <img src="plakat.png" alt="Srečanje generacij plakat">
    </div>

    <div class="content">
        <p class="eyebrow">Dogodek v živo</p>
        <h1 class="headline">Začnemo čez...</h1>
        
        <div id="countdown" class="countdown-grid">
            <div class="time-block"><span id="days">00</span><p>dni</p></div>
            <div class="time-block"><span id="hours">00</span><p>ur</p></div>
            <div class="time-block"><span id="minutes">00</span><p>min</p></div>
            <div class="time-block"><span id="seconds">00</span><p>sek</p></div>
        </div>

        <div class="event-info">
            <strong>23. maj 2026 ob 16:00</strong><br>
            Dom krajanov Sestrže
        </div>
    </div>
</div>

<script>
    const targetDate = new Date("May 23, 2026 16:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days;
        document.getElementById("hours").innerText = String(hours).padStart(2, '0');
        document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
        document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');

        if (distance < 0) {
            clearInterval(interval);
            document.querySelector(".headline").innerText = "Dogodek se je začel!";
            document.getElementById("countdown").style.display = "none";
        }
    }

    const interval = setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
